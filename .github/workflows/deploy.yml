name: Clean Deploy via Temp Folder

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST2 }}
          username: ${{ secrets.USERNAME2 }}
          key: ${{ secrets.SSH_PASS }}
          port: 22
          debug: true          # ← добавь это
          command_timeout: 30s # ← добавь явный таймаут
          script: |
            # Путь к файлам
            SITE_ROOT="/home/c/cs16144/test.olaplex-shop.ru"
            TEMP_DIR="$SITE_ROOT/temp"
            BASE_DIR="$SITE_ROOT/public_html"
            REPO="git@github.com:xSANCHOSx/ola.git"

            # Создаём структуру файлов
            mkdir -p $TEMP_DIR
            mkdir -p $BASE_DIR
            cd $TEMP_DIR

            # Инициализация или обновление репозитория
            if [ ! -d ".git" ]; then
              git clone $REPO .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            # Удаляем мусор перед копированием
            find . -name ".DS_Store" -delete
            find . -name "Thumbs.db" -delete

            # Синхронизация из temp/ в public_html/
            rsync -avz --delete \
              --exclude='.git/' \
              --exclude='.github/' \
              --exclude='.gitignore' \
              --exclude='.gitattributes' \
              --exclude='log/' \
              --exclude='images/' \
              --exclude='data/images/' \
              --exclude='data/uploads/' ./ $BASE_DIR/

            echo "Деплой выполнен успешно."