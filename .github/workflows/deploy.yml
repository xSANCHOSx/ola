name: Clean Deploy via Temp Folder

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # 1. Створюємо папку temp, якщо її немає
            mkdir -p /var/www/www-root/data/www/sanchos-dev.website/temp
            
            # 2. Переходимо в temp і оновлюємо репозиторій
            cd /var/www/www-root/data/www/sanchos-dev.website/temp
            
            # Якщо папка порожня — ініціалізуємо гіт, якщо ні — просто оновлюємо
            if [ ! -d ".git" ]; then
              git clone git@github.com:REAL_USER/REAL_REPO.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            # 3. Видаляємо сміття macOS всередині temp перед копіюванням
            find . -name ".DS_Store" -delete

            # 4. Синхронізуємо файли з temp в корінь сайту
            # --exclude дозволяє НЕ копіювати саму папку temp та git-файли в корінь
            rsync -avz --delete \
              --exclude='temp/' \
              --exclude='.git/' \
              --exclude='.github/' \
              --exclude='.gitignore' \
              --exclude='.gitattributes' \
              ./ ../

            echo "Деплой завершено: файли скопійовано в корінь, сміття видалено."