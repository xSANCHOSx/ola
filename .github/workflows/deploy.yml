name: Deploy Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove unnecessary files
        run: |
          rm -rf .git
          rm -rf .github
          rm -rf node_modules

      - name: Upload files
        uses: SamKirkland/web-deploy@v1
        with:
          target-server: ${{ secrets.HOST }}
          remote-user: ${{ secrets.USERNAME }}
          private-ssh-key: ${{ secrets.SSH_KEY }}
          destination-path: /var/www/www-root/data/www/sanchos-dev.website



          script: |
            cd /var/www/www-root/data/www/sanchos-dev.website
            git fetch origin
            git reset --hard origin/main
            php artisan optimize:clear || true

            