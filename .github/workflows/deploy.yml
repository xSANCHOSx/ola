name: Clean Deploy via Temp Folder

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST2 }}
          username: ${{ secrets.USERNAME2 }}
          key: ${{ secrets.SSH_PASS }}
          port: 22
          debug: true          # ← добавь это
          command_timeout: 30s # ← добавь явный таймаут
          script: |
            echo "HELLO"
            whoami
            pwd
            ls