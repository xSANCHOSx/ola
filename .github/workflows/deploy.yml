name: Clean Deploy via Temp Folder

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST2 }}
          username: ${{ secrets.USERNAME2 }}
          key: ${{ secrets.SSH_PASS }}
          port: 22
          debug: true          # ← добавь это
          command_timeout: 30s # ← добавь явный таймаут
          script: |
            set -euxo pipefail

            SITE_ROOT="/home/c/cs16144/www452"
            TEMP_DIR="$SITE_ROOT/temp"

            echo "===== USER ====="
            whoami

            echo "===== CURRENT DIR ====="
            pwd

            echo "===== HOME ====="
            echo "$HOME"

            echo "===== SITE ROOT ====="
            ls -ld "$SITE_ROOT"

            echo "===== CREATE TEMP ====="
            mkdir -pv "$TEMP_DIR"

            echo "===== CONTENT ====="
            ls -la "$SITE_ROOT"

            echo "===== DONE ====="