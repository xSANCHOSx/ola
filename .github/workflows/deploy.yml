name: Clean Deploy via Temp Folder

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # Шлях до папок
            BASE_DIR="/var/www/www-root/data/www/sanchos-dev.site"
            TEMP_DIR="$BASE_DIR/temp"
            REPO="git@github.com:REAL_USER/REAL_REPO.git"

            # Створюємо структуру папок
            mkdir -p $TEMP_DIR
            cd $TEMP_DIR

            # Ініціалізація або оновлення репозиторію
            if [ ! -d ".git" ]; then
              # Використовуємо -o StrictHostKeyChecking=no для SSH всередині сервера
              git clone $REPO .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            # Удаляем мусор перед копированием
            find . -name ".DS_Store" -delete
            find . -name "Thumbs.db" -delete

            # Синхронизация в корень сайта (на уровень выше)
            # --exclude='temp/' важно, чтобы не удалить саму папку temp
            rsync -avz --delete \
              --exclude='temp/' \
              --exclude='.git/' \
              --exclude='.github/' \
              --exclude='.gitignore' \
              --exclude='.gitattributes' \
              --exclude='db.php' \
              ./ ../

            echo "Деплой виконано успішно."