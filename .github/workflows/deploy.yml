name: Clean Deploy via Temp Folder

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST2 }}
          username: ${{ secrets.USERNAME2 }}
          key: ${{ secrets.SSH_PASS }}
          port: 22
          debug: true          # ← добавь это
          command_timeout: 30s # ← добавь явный таймаут
          script: |
            set -e
            SITE_ROOT="/home/c/cs16144/www452"
            TEMP_DIR="$SITE_ROOT/temp"
            BASE_DIR="$SITE_ROOT/public_html"
            REPO="git@github.com:xSANCHOSx/ola.git"

            mkdir -p $TEMP_DIR
            mkdir -p $BASE_DIR
            cd $TEMP_DIR

            if [ ! -d ".git" ]; then
              git clone $REPO .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            echo "=== Текущий коммит после reset ==="
            git log -1 --oneline

            find . -name ".DS_Store" -delete
            find . -name "Thumbs.db" -delete

            rsync -avzi --delete \
              --exclude='.git/' \
              --exclude='.github/' \
              --exclude='.gitignore' \
              --exclude='.gitattributes' \
              --exclude='log/' \
              --exclude='images/' \
              --exclude='data/images/' \
              --exclude='data/uploads/' ./ $BASE_DIR/

            echo "=== Дата изменения css на сервере ==="
            ls -la $BASE_DIR/css/wicart.css

            echo "Деплой выполнен успешно."